# git-cliff configuration
[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

<!-- git-cliff: generate entries below this line -->
"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first | trim_end_matches(pat=".") }}\
{% if commit.breaking %} (**BREAKING**){% endif %}
{%- endfor %}
{% endfor %}\n
"""

trim = true

footer = """
{% for release in releases %}\
{% if release.version %}\
{% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/Jebel-Quant/linalg/compare/{{ release.previous.version }}...{{ release.version }}
{% else %}\
[{{ release.version | trim_start_matches(pat="v") }}]: \
  https://github.com/Jebel-Quant/linalg/releases/tag/{{ release.version }}
{% endif %}\
{% else %}\
[Unreleased]: https://github.com/Jebel-Quant/linalg/compare/{{ releases | map(attribute="version") | select | first }}...HEAD
{% endif %}\
{% endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_parsers = [
  { message = "^feat", group = "New Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc|^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Maintenance" },
  { message = "^style", group = "Maintenance" },
  { message = "^chore", group = "Maintenance" },
  { message = "^build|^ci", group = "Maintenance" },
  { message = "^test", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
  { message = ".*", group = "Other Changes" },
]

commit_preprocessors = [
  { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/Jebel-Quant/linalg/issues/${1}))" },
]

protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
